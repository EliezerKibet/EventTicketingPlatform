name: Event Ticketing Platform Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore EventTicketing.API/
      
    - name: Build
      run: dotnet build EventTicketing.API/ --no-restore
      
    - name: Test
      run: dotnet test EventTicketing.API/EventTicketing.Tests/ --no-build --verbosity normal
